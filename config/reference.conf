# Default configuration values.
# Override in application.conf.

service {
  host = "0.0.0.0"
  port = 8000
}

gpu {
  quick_model = "qwen3:8b"
  deep_model = "qwen3:32b"
  ollama_url = "http://localhost:11434"
}

providers {
  # When empty, system auto-generates a single "local" provider from gpu.* block.
  # Example:
  # local {
  #   type = "ollama"
  #   url = "http://localhost:11434"
  #   quick_model = "qwen3:8b"
  #   deep_model = "qwen3:32b"
  #   priority = 1
  #   max_queue = -1
  #   max_concurrent = 1
  # }
}

evaluation {
  debounce_seconds = 300
  sell_fraction = 0.5
  news_relevance_min_score = 0.6
  merge_checks = 1
  allocation_checks = 1
}

watchlist {
  # Initial tickers (can also be managed via API/UI)
  tickers = []
  # Tickers that should never be added to any watchlist (blocks discovery + manual add)
  exclude = []
}

database {
  path = "./data/service.db"
}

redis {
  url = "redis://localhost:6379/0"
}

streams {
  news_symbols = ["*"]
}

polling {
  yfinance_enabled = true
  yfinance_interval_minutes = 30
  yfinance_articles_per_ticker = 10
  yfinance_backoff_seconds = 60
  yfinance_max_failures = 5
}

auth {
  # Set a password to enable authentication. Leave empty to disable.
  password = ""
  password = ${?TA_AUTH_PASSWORD}
  secret = "change-me-in-production"
  secret = ${?TA_AUTH_SECRET}
}

metrics {
  enabled = false
  influxdb_url = "http://localhost:8086"
  influxdb_token = ""
  influxdb_token = ${?INFLUXDB_TOKEN}
  influxdb_org = "trading"
  influxdb_bucket = "trading_metrics"
}
